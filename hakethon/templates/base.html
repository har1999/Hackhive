<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaamSetu - Connecting Trust</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        :root { --orange: #f97316; --dark: #374151; --gray: #6b7280; --light: #f3f4f6; }
        body { font-family: 'Inter', sans-serif; background: var(--light); color: var(--dark); margin: 0; }
        nav { background: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e5e7eb; }
        .logo { font-weight: 800; font-size: 1.5rem; color: var(--dark); text-decoration: none; }
        .logo span { color: var(--orange); }
        .container { max-width: 1200px; margin: 0 auto; padding: 1rem; }
        .btn-logout { color: var(--gray); text-decoration: none; font-weight: 600; font-size: 0.9rem; }
        .messages { list-style: none; padding: 0; }
        .message { padding: 1rem; border-radius: 8px; margin-bottom: 1rem; font-weight: 600; }
        .message.success { background: #dcfce7; color: #166534; }
        .message.error { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">Kaam<span>Setu</span></a>
        {% if user.is_authenticated %}
            <form action="{% url 'logout' %}" method="POST" style="display:inline;">
                {% csrf_token %}
                <button type="submit" class="btn-logout" style="background:none; border:none; cursor:pointer;">Logout</button>
            </form>
        {% endif %}
    </nav>

    <div class="container">
        {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                    <li class="message {{ message.tags }}">{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
