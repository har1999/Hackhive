{% extends 'base.html' %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1 class="brand-title">Kaam<span>Setu</span></h1>
        <p class="auth-subtitle">Login to manage your jobs and profile.</p>
        
        <form method="POST" class="auth-form">
            {% csrf_token %}
            <input type="tel" name="phone" placeholder="Phone Number" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn-primary">Login</button>
        </form>
      

<p class="auth-footer">Don't have an account? <a href="{% url 'signup' %}" style="color: var(--orange); font-weight: bold;">Sign Up</a></p>
    </div>
</div>

<style>
    .auth-container { display: flex; justify-content: center; align-items: center; min-height: 80vh; }
    .auth-card { background: white; padding: 2.5rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
    .brand-title { color: #374151; font-weight: 800; font-size: 2rem; }
    .brand-title span { color: #f97316; }
    .auth-form input { width: 100%; padding: 0.8rem; margin-bottom: 1rem; border: 1px solid #e5e7eb; border-radius: 10px; box-sizing: border-box; }
    .btn-primary { width: 100%; background: #f97316; color: white; padding: 1rem; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }
</style>
{% endblock %}
